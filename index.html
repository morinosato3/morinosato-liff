<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タブUI</title>

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #000;
    font-family: sans-serif;
}

/* 画像をスマホ幅にフィット */
.tab-image {
    width: 100%;
    height: auto;
    display: none;
}

/* 表示中のタブだけ表示 */
.active {
    display: block;
}

/* 透明ボタン */
.button-area {
    position: absolute;
    left: 0;
    width: 100%;
}

/* タブ切り替えボタン */
.tab-buttons {
    display: flex;
    width: 100%;
}

.tab-btn {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: #ddd;
    border: 1px solid #aaa;
    cursor: pointer;
    font-size: 18px;
}

.tab-btn.active {
    background: #fff;
    font-weight: bold;
}

/* 画像の上に透明ボタンを重ねるための枠 */
.wrapper {
    position: relative;
    width: 100%;
}
</style>

</head>
<body>

<!-- タブ切り替え -->
<div class="tab-buttons">
    <div class="tab-btn active" onclick="showTab(1)">自治会館</div>
    <div class="tab-btn" onclick="showTab(2)">自治会</div>
</div>

<!-- タブ1 -->
<div id="tab1" class="wrapper">
    <img src="form3.jpg" class="tab-image active" id="img1">

    <!-- 透明ボタン（座標は画像の縮尺に合わせてJSで補正） -->
    <a href="#" id="btn1_1" class="button-area"></a>
    <a href="https://morinosato-jichi.sakura.ne.jp/3chome/schedule/" id="btn1_2" class="button-area"></a>
    <a href="#" id="btn1_3" class="button-area"></a>
    <a href="https://morinosato-jichi.sakura.ne.jp/3chome/%e3%82%88%e3%81%8f%e3%81%82%e3%82%8b-%e3%81%94%e8%b3%aa%e5%95%8f/" id="btn1_4" class="button-area"></a>
</div>

<!-- タブ2 -->
<div id="tab2" class="wrapper" style="display:none;">
    <img src="form4.jpg" class="tab-image" id="img2">

    <a href="https://morinosato.net/jichiren/sarubbs/" id="btn2_1" class="button-area"></a>
    <a href="https://morinosato-jichi.sakura.ne.jp/3chome/" id="btn2_2" class="button-area"></a>
    <a href="https://morinosato.net/jichiren/kemonobbs/" id="btn2_3" class="button-area"></a>
    <a href="https://morinosato-jichi.sakura.ne.jp/3chome/convenience-book/" id="btn2_4" class="button-area"></a>
</div>

<script>
// タブ切り替え
function showTab(n) {
    document.getElementById("tab1").style.display = (n === 1) ? "block" : "none";
    document.getElementById("tab2").style.display = (n === 2) ? "block" : "none";

    const btns = document.getElementsByClassName("tab-btn");
    btns[0].classList.toggle("active", n === 1);
    btns[1].classList.toggle("active", n === 2);
}

// 透明ボタンの位置設定（縮尺対応）
function setButtons() {
    const img1 = document.getElementById("img1");
    const img2 = document.getElementById("img2");

    const naturalHeight = 1686; // 元画像の高さ
    const startY = 420;
    const btnH = 624;

    const scale1 = img1.clientHeight / naturalHeight;
    const scale2 = img2.clientHeight / naturalHeight;

    // タブ1
    for (let i = 1; i <= 4; i++) {
        const btn = document.getElementById("btn1_" + i);
        btn.style.top = (startY + btnH * (i - 1)) * scale1 + "px";
        btn.style.height = (btnH * scale1) + "px";
    }

    // タブ2
    for (let i = 1; i <= 4; i++) {
        const btn = document.getElementById("btn2_" + i);
        btn.style.top = (startY + btnH * (i - 1)) * scale2 + "px";
        btn.style.height = (btnH * scale2) + "px";
    }
}

window.onload = setButtons;
window.onresize = setButtons;
</script>

</body>
</html>
