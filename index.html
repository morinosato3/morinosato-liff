<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>森の里三丁目 自治会 LIFF</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .wrapper {
    position: relative;
    width: 100%;
    max-width: 500px; /* スマホ想定の最大幅（好みで調整可） */
    margin: 0 auto;
  }

  .tab-image {
    width: 100%;
    height: auto;
    display: block;
  }

  .tab-panel {
    display: none;
  }

  .tab-panel.active {
    display: block;
  }

  .hotspot {
    position: absolute;
    display: block;
  }

  .hotspot[href="#"] {
    pointer-events: none; /* 未定リンクは押せないようにしておく */
  }
</style>
</head>
<body>

<div class="wrapper">

  <!-- タブ1：自治会館 -->
  <div id="panel1" class="tab-panel active">
    <img src="form3.jpg" id="img1" class="tab-image" alt="自治会館メニュー">

    <!-- タブ部分（上段 420px） -->
    <!-- 左タブ：自治会館（タブ1を表示） -->
    <a href="javascript:void(0)" id="t1_tabL" class="hotspot" onclick="showTab(1)"></a>
    <!-- 右タブ：自治会（タブ2へ） -->
    <a href="javascript:void(0)" id="t1_tabR" class="hotspot" onclick="showTab(2)"></a>

    <!-- 行1（高さ 633px） -->
    <!-- 左：自治会館予約フォーム（未定） -->
    <a href="#" id="t1_b1L" class="hotspot"></a>
    <!-- 右：自治会館予定表 -->
    <a href="https://morinosato-jichi.sakura.ne.jp/3chome/schedule/" id="t1_b1R" class="hotspot"></a>

    <!-- 行2（高さ 633px） -->
    <!-- 左：自治会館使用日誌フォーム（未定） -->
    <a href="#" id="t1_b2L" class="hotspot"></a>
    <!-- 右：よくあるご質問 -->
    <a href="https://morinosato-jichi.sakura.ne.jp/3chome/%e3%82%88%e3%81%8f%e3%81%82%e3%82%8b-%e3%81%94%e8%b3%aa%e5%95%8f/" id="t1_b2R" class="hotspot"></a>
  </div>

  <!-- タブ2：自治会情報 -->
  <div id="panel2" class="tab-panel">
    <img src="form4.jpg" id="img2" class="tab-image" alt="自治会情報メニュー">

    <!-- タブ部分（上段 420px） -->
    <!-- 左タブ：自治会館（タブ1へ） -->
    <a href="javascript:void(0)" id="t2_tabL" class="hotspot" onclick="showTab(1)"></a>
    <!-- 右タブ：自治会（タブ2を表示） -->
    <a href="javascript:void(0)" id="t2_tabR" class="hotspot" onclick="showTab(2)"></a>

    <!-- 行1（高さ 633px） -->
    <!-- 左：サルの目撃情報 -->
    <a href="https://morinosato.net/jichiren/sarubbs/" id="t2_b1L" class="hotspot"></a>
    <!-- 右：森の里三丁目自治会ホームページ -->
    <a href="https://morinosato-jichi.sakura.ne.jp/3chome/" id="t2_b1R" class="hotspot"></a>

    <!-- 行2（高さ 633px） -->
    <!-- 左：野生動物の目撃情報 -->
    <a href="https://morinosato.net/jichiren/kemonobbs/" id="t2_b2L" class="hotspot"></a>
    <!-- 右：くらしの便利帳 -->
    <a href="https://morinosato-jichi.sakura.ne.jp/3chome/convenience-book/" id="t2_b2R" class="hotspot"></a>
  </div>

</div>

<script>
  // 元画像サイズ
  const NATURAL_W = 2500;
  const TAB_H     = 420;
  const ROW_H     = 633;
  const LEFT_W    = 1650;
  const RIGHT_W   = 850;

  function showTab(n) {
    document.getElementById('panel1').classList.toggle('active', n === 1);
    document.getElementById('panel2').classList.toggle('active', n === 2);
    // タブ切り替え後も再計算（高さが変わる可能性に備えて）
    setHotspots();
  }

  function setHotspots() {
    const img1 = document.getElementById('img1');
    const img2 = document.getElementById('img2');

    if (!img1.complete || !img2.complete) {
      // 画像読み込み前なら後で再実行
      setTimeout(setHotspots, 100);
      return;
    }

    const w1 = img1.clientWidth;
    const w2 = img2.clientWidth;

    const scale1 = w1 / NATURAL_W;
    const scale2 = w2 / NATURAL_W;

    // 共通：タブ行・行1・行2 の top
    const tabTop   = 0;
    const row1Top  = TAB_H;
    const row2Top  = TAB_H + ROW_H;

    // --- タブ1（form3.jpg） ---
    setRect('t1_tabL',  tabTop, 0,        LEFT_W,  TAB_H,  scale1);
    setRect('t1_tabR',  tabTop, LEFT_W,   RIGHT_W, TAB_H,  scale1);

    setRect('t1_b1L',   row1Top, 0,        LEFT_W,  ROW_H, scale1);
    setRect('t1_b1R',   row1Top, LEFT_W,   RIGHT_W, ROW_H, scale1);

    setRect('t1_b2L',   row2Top, 0,        LEFT_W,  ROW_H, scale1);
    setRect('t1_b2R',   row2Top, LEFT_W,   RIGHT_W, ROW_H, scale1);

    // --- タブ2（form4.jpg） ---
    setRect('t2_tabL',  tabTop, 0,        LEFT_W,  TAB_H,  scale2);
    setRect('t2_tabR',  tabTop, LEFT_W,   RIGHT_W, TAB_H,  scale2);

    setRect('t2_b1L',   row1Top, 0,        LEFT_W,  ROW_H, scale2);
    setRect('t2_b1R',   row1Top, LEFT_W,   RIGHT_W, ROW_H, scale2);

    setRect('t2_b2L',   row2Top, 0,        LEFT_W,  ROW_H, scale2);
    setRect('t2_b2R',   row2Top, LEFT_W,   RIGHT_W, ROW_H, scale2);
  }

  function setRect(id, top, left, width, height, scale) {
    const el = document.getElementById(id);
    el.style.top    = (top    * scale) + 'px';
    el.style.left   = (left   * scale) + 'px';
    el.style.width  = (width  * scale) + 'px';
    el.style.height = (height * scale) + 'px';
  }

  window.addEventListener('load', setHotspots);
  window.addEventListener('resize', setHotspots);
</script>

</body>
</html>
