<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>森の里三丁目 自治会メニュー</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f0f0f0;
    }
    .tab-bar {
      display: flex;
      background: #ffffff;
      border-bottom: 2px solid #ccc;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
      border-right: 1px solid #ddd;
    }
    .tab:last-child {
      border-right: none;
    }
    .tab.active {
      background: #e0f0ff;
      font-weight: bold;
    }
    .content {
      display: none;
    }
    .content.active {
      display: block;
    }
    .menu-wrapper {
      position: relative;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }
    .menu-image {
      width: 100%;
      display: block;
    }
    .button-area {
      position: absolute;
      display: block;
    }
  </style>
</head>
<body>

<div class="tab-bar">
  <div class="tab active" onclick="showTab(1)">自治会館メニュー</div>
  <div class="tab" onclick="showTab(2)">自治会情報メニュー</div>
</div>

<!-- タブ1：自治会館 -->
<div id="tab1" class="content active">
  <div class="menu-wrapper">
    <!-- ★ここにタブ1画像のURLを入れる -->
    <img src="TAB1_IMAGE_URL" class="menu-image">

    <!-- ここから下は後でURLと座標を埋める -->
    <!-- 例：自治会館予約フォーム -->
    <!--
    <a href="https://example.com/reserve"
       class="button-area"
       style="top: 300px; left: 20px; width: 460px; height: 120px;"></a>
    -->
  </div>
</div>

<!-- タブ2：自治会情報 -->
<div id="tab2" class="content">
  <div class="menu-wrapper">
    <!-- ★ここにタブ2画像のURLを入れる -->
    <img src="TAB2_IMAGE_URL" class="menu-image">

    <!-- ここも後でURLと座標を埋める -->
  </div>
</div>

<script>
function showTab(n) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', i === n - 1);
  });
  document.querySelectorAll('.content').forEach((c, i) => {
    c.classList.toggle('active', i === n - 1);
  });
}
</script>

</body>
</html>
